[mgr]
show_hidden = true
ratio = [1,3,4]
linemode = "permissions"
sort_by = "natural"
show_symlink = true

[preview]
wrap = "yes"
image_filter = "nearest"
image_delay = 0

[opener]
edit = [
    { run = 'nvim "$@"', block = true },
]
image=[
    {run = 'feh "$@"', block = true}
]
pdf=[
    {run = 'zen "$@"', block = true}
]
html=[
    {run = 'zen "$@"', block = true}
]
video = [
     # { run = 'mpv "$@"', desc = "Play video", orphan = true, confirm = false, block = true }
    { run = 'nohup mpv "$@" >/dev/null 2>&1 &', desc = "Play video", confirm = false }
]

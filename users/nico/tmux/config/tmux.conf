# Custom-Bindings:
bind-key 1 select-window -t :1
bind-key 2 select-window -t :2
bind-key 3 select-window -t :3
bind-key 4 select-window -t :4
bind-key 5 select-window -t :5
bind-key 6 select-window -t :6
bind-key 7 select-window -t :7
bind-key 8 select-window -t :8
bind-key 9 select-window -t :9

bind -n M-l if-shell '[ "#{window_index}" -lt "#{last_window_index}" ]' 'next-window'
bind -n M-h if-shell '[ "#{window_index}" -gt 0 ]' 'previous-window'

bind-key -n M-H if-shell '[ "#{window_index}" -gt 0 ]' \
    "swap-window -t -1 \; select-window -t -1"

bind-key -n M-L if-shell '[ "#{window_index}" -lt "#{last_window_index}" ]' \
    "swap-window -t +1 \; select-window -t +1"

bind '"' split-window -v -c "#{pane_current_path}"
bind S split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind H split-window -h -c "#{pane_current_path}"
bind d detach
bind -n C-t run-shell "rofi-tmux window-here"
bind -n C-w kill-pane
bind-key X kill-session
# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix

# Options:
set -g base-index 0
set -g pane-base-index 0
set-window-option -g pane-base-index 0
set-option -g renumber-windows on
set-option -g focus-events on
set-option -a terminal-features 'tmux-256color:RGB'

set -g @crimson-tmux_theme "black"    # storm | day | default to 'night'
set -g @crimson-tmux_window_id_style hide
set -g @crimson-tmux_pane_id_style hide
set -g @crimson-tmux_zoom_id_style hide
set -g @crimson-tmux_show_path 1
set -g @crimson-tmux_path_format relative # 'relative' or 'full'
set -g @crimson-tmux_show_datetime 1
set -g @crimson-tmux_date_format DMY
set -g @crimson-tmux_time_format 24H
set -g @crimson-tmux_show_git 0
set -g @crimson-tmux_show_battery_widget 0
set -g @crimson-tmux_show_wbg 0

set -g default-shell /run/current-system/sw/bin/zsh
set -g default-command /run/current-system/sw/bin/zsh

# TMUX plugin manager (keep this line at the very bottom of tmux.conf):
run-shell ~/.config/tmux/themes/crimson-tmux/crimson.tmux
